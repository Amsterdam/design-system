version: 2

# Documentation:
# https://docs.github.com/en/code-security/supply-chain-security/keeping-your-dependencies-updated-automatically/enabling-and-disabling-version-updates
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 1 # Wait for one day after release before updating a dependency
    groups:
      patch-and-minor-actions:
        applies-to: "version-updates"
        update-types:
          - "patch"
          - "minor"
    commit-message:
      prefix: chore
      include: scope
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 1 # Wait for one day after release before updating a dependency
    # Prod and dev dependencies are split in two groups,
    # because their PRs get a different prefix ('fix' for prod, 'chore' for dev)
    groups:
      patch-and-minor-dependencies:
        applies-to: "version-updates"
        dependency-type: "production"
        update-types:
          - "patch"
          - "minor"
      patch-and-minor-dev-dependencies:
        applies-to: "version-updates"
        dependency-type: "development"
        update-types:
          - "patch"
          - "minor"
    versioning-strategy: "increase-if-necessary"
    open-pull-requests-limit: 20
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
    ignore:
      # jsdom 27+ changed accessible name computation, dropping the space between
      # sibling text fragments (e.g. visually-hidden text + adjacent text or SVG
      # aria-label). This breaks getByRole({ name }) in our Pagination and
      # PageHeader tests. Real browsers are unaffected. Remove once the upstream
      # fix lands: https://github.com/eps1lon/dom-accessibility-api/issues/1087
      - dependency-name: "jsdom"
        versions: [">=27"]
  - package-ecosystem: "pip"
    directory: "/.github/scripts"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 1 # Wait for one day after release before updating a dependency
    groups:
      patch-and-minor-python:
        applies-to: "version-updates"
        update-types:
          - "patch"
          - "minor"
    commit-message:
      prefix: chore
      include: scope
