# GitHub Actions workflow to clean up obsolete `demo-*` GitHub Deployments.
# Runs on a weekly schedule and can be triggered manually.
#
# A deployment targeting environment `demo-X` is considered obsolete when no
# remote branch matches `X` after stripping the leading `<prefix>/` segment —
# the same transformation feature-branch-deploy.yml applies when creating these
# deployments. Other deployment environments are left alone.
#
# The default `dry_run=true` only logs what would be deleted.
# Pass `dry_run=false` from the Actions UI to perform deletions.

name: Cleanup obsolete deployments

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, only log what would be deleted."
        required: false
        default: "true"
      stale_days:
        description: "Only delete deployments not updated in this many days (0 = ignore age)."
        required: false
        default: "0"
      i_really_mean_it:
        description: "Allow deleting more than 25 deployments in one run."
        required: false
        default: "false"
  schedule:
    - cron: "0 5 * * 0" # Every Sunday at 05:00 UTC

permissions:
  contents: read
  deployments: write

concurrency:
  group: cleanup-deployments
  cancel-in-progress: false

jobs:
  cleanup-deployments:
    runs-on: ubuntu-latest
    steps:
      - name: Check out scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@42375524d0a3c83d1a8f3d1779a827123c5c2a43 # v5.4.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: "pip install --only-binary=:all: --require-hashes -r .github/scripts/requirements.txt"

      - name: Cleanup deployments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        # On schedule, github.event.inputs is empty, so this resolves to --dry-run
        # and --stale-days 14 — guarding against deleting a deployment created by
        # an in-flight feature-branch deploy.
        run: |
          python .github/scripts/cleanup_deployments.py \
            ${{ (github.event.inputs.dry_run == 'false') && '--no-dry-run' || '--dry-run' }} \
            --stale-days "${{ github.event.inputs.stale_days || '14' }}" \
            ${{ (github.event.inputs.i_really_mean_it == 'true') && '--i-really-mean-it' || '' }}
