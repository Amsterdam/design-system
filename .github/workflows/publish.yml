name: Publish

on:
  workflow_run:
    workflows: [Lint and test]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  id-token: write # Required for trusted publishing to npm
  pull-requests: write

jobs:
  create-release-and-publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Create release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main

      # The logic below handles the Storybook deploy:
      - name: Check out branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # This is necessary because on.workflow_run always runs on the
          # default branch, which is 'develop' in our case
          ref: "main"

      - name: Install pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1

      - name: Set up Node.js version
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm --filter=storybook build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          branch: gh-pages
          folder: storybook/dist
          # feature branch directories are prefixed with demo-*
          # these are excluded from this action's default clean
          clean-exclude: demo-*

      # The logic below handles the npm publication:
      - name: Publish
        run: pnpm -r publish
        # this if statement ensures that a publication only occurs when
        # a new release is created:
        if: ${{ steps.release.outputs.releases_created == 'true' }}
