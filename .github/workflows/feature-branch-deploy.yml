# Based on https://evilmartians.com/chronicles/super-github-pages-budget-frontend-staging-with-storybook-and-more

name: Feature branch build and deploy

on:
  push:
    branches-ignore: [main]
  pull_request:
    types: [reopened]
    branches-ignore: [main]

permissions:
  contents: write
  deployments: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - name: Create branch name without text before first forward slash
        run: |
          RAW_BRANCH_NAME=${{ github.head_ref || github.ref_name }}
          BRANCH_NAME=$(echo $RAW_BRANCH_NAME | sed 's/[^/]*\///')
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Create deployment
        id: deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENV_NAME: demo-${{ env.BRANCH_NAME }}
        run: |
          PAYLOAD=$(jq -n \
            --arg ref "$GITHUB_SHA" \
            --arg env "$ENV_NAME" \
            '{ref: $ref, environment: $env, auto_merge: false, required_contexts: []}')
          DEPLOYMENT_ID=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$GITHUB_REPOSITORY/deployments" \
            --input - \
            --jq '.id' <<< "$PAYLOAD")
          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js version
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages and Storybook
        env:
          STORYBOOK_BUILD_PATH: demo-${{ env.BRANCH_NAME }}
        run: pnpm build

      - name: Create a version mark
        run: |
          touch ./storybook/dist/${{ github.sha }}.txt

      - name: Pushing to pages branch
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          branch: gh-pages
          folder: storybook/dist
          target-folder: demo-${{ env.BRANCH_NAME }}

      - name: Wait for GitHub Pages to be deployed
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 40
          retry_wait_seconds: 15
          command: |
            curl -sf https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/demo-${{ env.BRANCH_NAME }}/${{ github.sha }}.txt

      - name: Update deployment status
        if: always() && steps.deployment.outputs.deployment_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
          ENV_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/demo-${{ env.BRANCH_NAME }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then STATE=success; else STATE=failure; fi
          LOG_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          PAYLOAD=$(jq -n \
            --arg state "$STATE" \
            --arg env_url "$ENV_URL" \
            --arg log_url "$LOG_URL" \
            '{state: $state, environment_url: $env_url, log_url: $log_url}')
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$GITHUB_REPOSITORY/deployments/$DEPLOYMENT_ID/statuses" \
            --input - <<< "$PAYLOAD"
