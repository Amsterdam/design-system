# GitHub Actions workflow to clean up stale GitHub Deployments.
# Runs on a weekly schedule and can be triggered manually.
#
# Default scope: `demo-*` deployments whose branch is gone. A deployment
# targeting environment `demo-X` is stale when no remote branch matches `X`
# after stripping the leading `<prefix>/` segment — the same transformation
# deploy-acceptance-storybook.yml applies when creating these deployments.
#
# Optional scope (manual dispatch with `include_production=true`):
# `github-pages` and `demo-develop`. Branch-existence does not apply (those
# branches always exist); instead candidates must pass `stale_days`, and the
# newest few deployments per env are protected as live + rollback target.
# Scheduled runs never include production.
#
# The default `dry_run=true` only logs what would be deleted.
# Pass `dry_run=false` from the Actions UI to perform deletions.

name: Remove stale deployments

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, only log what would be deleted."
        required: false
        default: "true"
      stale_days:
        description: "Only delete deployments not updated in this many days (0 = ignore age)."
        required: false
        default: "0"
      include_production:
        description: "Also clean github-pages and demo-develop deployments. Off by default."
        required: false
        default: "false"
      i_really_mean_it:
        description: "Allow deleting more than 25 deployments in one run."
        required: false
        default: "false"
  schedule:
    - cron: "0 5 * * 0" # Every Sunday at 05:00 UTC

permissions:
  contents: read
  deployments: write

concurrency:
  group: remove-stale-deployments
  cancel-in-progress: false

jobs:
  remove-deployments:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: "pip install --only-binary=:all: --require-hashes -r .github/scripts/requirements.txt"

      - name: Remove deployments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        # On schedule, github.event.inputs is empty, so this resolves to
        # --dry-run, --stale-days 14, no --include-production. Scheduled runs
        # therefore only touch demo-* with the 14-day grace window.
        run: |
          python .github/scripts/cleanup_deployments.py \
            ${{ (github.event.inputs.dry_run == 'false') && '--no-dry-run' || '--dry-run' }} \
            --stale-days "${{ github.event.inputs.stale_days || '14' }}" \
            ${{ (github.event.inputs.include_production == 'true') && '--include-production' || '' }} \
            ${{ (github.event.inputs.i_really_mean_it == 'true') && '--i-really-mean-it' || '' }}
