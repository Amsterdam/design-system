# GitHub Actions workflow to clean up stale `demo-*` GitHub Environments.
# Runs on a weekly schedule and can be triggered manually.
#
# A `demo-X` environment is considered stale when no remote branch matches
# `X` after stripping the leading `<prefix>/` segment — the same transformation
# deploy-acceptance-storybook.yml applies when creating these environments. Other
# environment names are left alone.
#
# The default `dry_run=true` only logs what would be deleted. Pass
# `dry_run=false` from the Actions UI to perform the deletions.

name: Remove stale environments

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, only log what would be deleted."
        required: false
        default: "true"
      stale_days:
        description: "Only delete environments not updated in this many days (0 = ignore age)."
        required: false
        default: "0"
      i_really_mean_it:
        description: "Allow deleting more than 25 environments in one run."
        required: false
        default: "false"
  schedule:
    - cron: "0 4 * * 0" # Every Sunday at 04:00 UTC

permissions:
  contents: read
  # NOTE: Deleting environments requires repo Administration: write, which is
  # NOT exposable on GITHUB_TOKEN via the workflow permissions block. Set the
  # ENV_ADMIN_TOKEN secret to a fine-grained PAT or GitHub App installation
  # token with 'Administration: Read and write' on this repo. Without it, the
  # delete step will return 403 once dry_run is set to false.

concurrency:
  group: remove-stale-environments
  cancel-in-progress: false

jobs:
  remove-environments:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: "pip install --only-binary=:all: --require-hashes -r .github/scripts/requirements.txt"

      - name: Remove environments
        env:
          # Falls through to GITHUB_TOKEN when the admin secret isn't set so
          # dry-runs and listing still work; see permissions note above.
          GITHUB_TOKEN: ${{ secrets.ENV_ADMIN_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        # On schedule, github.event.inputs is empty, so this resolves to --dry-run
        # and --stale-days 14 — guarding against deleting an env created by an
        # in-flight feature-branch deploy.
        run: |
          python .github/scripts/cleanup_environments.py \
            ${{ (github.event.inputs.dry_run == 'false') && '--no-dry-run' || '--dry-run' }} \
            --stale-days "${{ github.event.inputs.stale_days || '14' }}" \
            ${{ (github.event.inputs.i_really_mean_it == 'true') && '--i-really-mean-it' || '' }}
