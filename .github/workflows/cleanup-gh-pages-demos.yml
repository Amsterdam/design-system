# GitHub Actions workflow to clean up stale demo-* directories from gh-pages.
#
# Runs automatically after a major release (any release-please tag ending in
# `.0.0`, e.g. `design-system-react-v4.0.0`) and can be triggered manually.
# Major releases happen roughly every 3 months, so this is the natural cadence
# for cleaning up demo previews.
#
# A directory `demo-X` is considered stale when no remote branch matches `X`
# after stripping the leading `<prefix>/` segment from the branch name — the
# same transformation feature-branch-deploy.yml applies when creating these
# directories.
#
# Release-triggered runs always perform the deletion. Manual runs default to
# `dry_run=true` (logs only); pass `dry_run=false` from the Actions UI to
# perform the deletions and push the resulting commit.
#
# `stale_days` controls age-based skipping for stale directories, mirroring the
# Python cleanup script: directories updated more recently than `stale_days` are
# kept. `0` disables age filtering.
#
# Safety guard: if more than MAX_DELETES stale demo directories are selected,
# the job aborts unless `i_really_mean_it=true` is provided for manual runs.

name: Cleanup stale demo directories from gh-pages

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, only log what would be deleted."
        required: false
        default: "true"
      stale_days:
        description: "Only delete directories not updated in this many days (0 = ignore age)."
        required: false
        default: "0"
      i_really_mean_it:
        description: "Allow deleting more than MAX_DELETES directories in one run."
        required: false
        default: "false"
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: cleanup-gh-pages-demos
  cancel-in-progress: false

jobs:
  cleanup-demos:
    # Run on manual dispatch, or on a major-version release of a `design-system-*`
    # package — tag format is `design-system-<pkg>-v<major>.<minor>.<patch>`, so
    # the prefix scopes us to our release-please tags and the suffix scopes us to
    # majors.
    if: ${{ github.event_name == 'workflow_dispatch' || (startsWith(github.event.release.tag_name, 'design-system-') && endsWith(github.event.release.tag_name, '.0.0')) }}
    runs-on: ubuntu-latest
    env:
      # Release-triggered runs always perform the deletion; manual runs
      # honour the workflow input (defaults to dry-run).
      DRY_RUN: ${{ github.event_name == 'release' && 'false' || github.event.inputs.dry_run || 'true' }}
      STALE_DAYS: ${{ github.event.inputs.stale_days || '0' }}
      I_REALLY_MEAN_IT: ${{ github.event.inputs.i_really_mean_it || 'false' }}
      MAX_DELETES: "25"
    steps:
      - name: Check out gh-pages branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: gh-pages

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Remove stale demo directories
        run: |
          set -euo pipefail
          shopt -s nullglob

          # Mirror the transformation feature-branch-deploy.yml applies:
          # take each remote branch and strip everything up to and including
          # the first '/'. The result is the directory suffix used in `demo-*`.
          #
          # NOTE: `mapfile < <(...)` does NOT propagate failures from a
          # process substitution under `set -e`. Running `git ls-remote` into
          # a tempfile first ensures that an auth/network failure on the
          # remote fetch aborts the job. A failure inside the downstream
          # awk|sed pipeline is still swallowed by mapfile, but the empty-list
          # guard below catches the worst case (deleting every demo-*).
          ls_remote_out="$(mktemp)"
          trap 'rm -f "$ls_remote_out"' EXIT
          git ls-remote --heads origin > "$ls_remote_out"

          mapfile -t active_short_names < <(
            awk '{print $2}' "$ls_remote_out" \
              | sed -E 's|^refs/heads/||; s|^[^/]*/||'
          )

          if [ "${#active_short_names[@]}" -eq 0 ]; then
            echo "ERROR: remote branch list is empty — refusing to proceed." >&2
            exit 2
          fi

          case "$STALE_DAYS" in
            ''|*[!0-9]*)
              echo "ERROR: stale_days must be a non-negative integer, got '$STALE_DAYS'." >&2
              exit 2
              ;;
          esac

          case "$MAX_DELETES" in
            ''|*[!0-9]*)
              echo "ERROR: MAX_DELETES must be a non-negative integer, got '$MAX_DELETES'." >&2
              exit 2
              ;;
          esac

          case "$I_REALLY_MEAN_IT" in
            true|false)
              ;;
            *)
              echo "ERROR: i_really_mean_it must be 'true' or 'false', got '$I_REALLY_MEAN_IT'." >&2
              exit 2
              ;;
          esac

          now_epoch="$(date +%s)"
          to_delete=()

          for dir in demo-*/; do
            dir="${dir%/}"
            short_name="${dir#demo-}"
            if printf '%s\n' "${active_short_names[@]}" | grep -Fxq -- "$short_name"; then
              continue
            fi

            if [ "$STALE_DAYS" -gt 0 ]; then
              updated_epoch="$(git log -1 --format=%ct -- "$dir" 2>/dev/null || true)"
              if [ -z "$updated_epoch" ]; then
                echo "Skipping stale demo with unknown updated time (age filter active): $dir"
                continue
              fi
              age_days="$(( (now_epoch - updated_epoch) / 86400 ))"
              if [ "$age_days" -lt "$STALE_DAYS" ]; then
                echo "Skipping stale demo updated ${age_days} day(s) ago (< ${STALE_DAYS}): $dir"
                continue
              fi
            fi

            to_delete+=("$dir")
          done

          if [ "${#to_delete[@]}" -eq 0 ]; then
            echo "No stale demo directories to remove."
            exit 0
          fi

          if [ "${#to_delete[@]}" -gt "$MAX_DELETES" ] && [ "$I_REALLY_MEAN_IT" != "true" ]; then
            echo "ERROR: would delete ${#to_delete[@]} directories (cap is ${MAX_DELETES})." >&2
            echo "Re-run with i_really_mean_it=true to override." >&2
            for dir in "${to_delete[@]}"; do
              echo "  - ${dir}" >&2
            done
            exit 2
          fi

          for dir in "${to_delete[@]}"; do
            short_name="${dir#demo-}"
            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY RUN] Would delete stale demo: $dir (no active branch matches '$short_name')"
              continue
            fi
            echo "Deleting stale demo: $dir (no active branch matches '$short_name')"
            git rm -rq "$dir"
          done

      - name: Commit and push if any directories were removed
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "[DRY RUN] Skipping commit and push."
            exit 0
          fi
          if git diff --cached --quiet; then
            echo "No stale demo directories to remove."
            exit 0
          fi
          git commit -m "chore: cleanup stale demo directories [ci skip]"
          git push origin gh-pages
