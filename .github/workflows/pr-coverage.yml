name: Coverage report

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js version
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build icons package
        run: pnpm --filter @amsterdam/design-system-react-icons build

      - name: Run tests with coverage
        run: pnpm --filter @amsterdam/design-system-react test

      - name: Report coverage
        uses: davelosert/vitest-coverage-report-action@02f3c2e641286b7fa308cd3e430783103ce6103b # v2.12.0
        with:
          json-summary-path: packages/react/coverage/coverage-summary.json
          name: React components
          threshold-icons: '{"0": "🔴", "95": "🟠", "99": "🟢"}'
