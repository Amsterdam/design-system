# Based on https://evilmartians.com/chronicles/super-github-pages-budget-frontend-staging-with-storybook-and-more

name: Remove acceptance Storybook

on:
  pull_request:
    types: [closed]
    branches-ignore: [main]

permissions:
  contents: write
  deployments: write

env:
  RAW_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
jobs:
  remove-demo-directory:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - name: Create branch name without text before first forward slash
        run: |
          BRANCH_NAME=$(printf '%s' "$RAW_BRANCH_NAME" | sed 's/[^/]*\///')
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"

      - name: Check out branch to access .nvmrc
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js version
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Check out gh-pages branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages

      - name: Remove demo directory
        run: |
          git config --global user.name GitHub Action
          git config --global user.email github-action@users.noreply.github.com
          git rm "demo-$BRANCH_NAME" -r
          git add .
          git commit -m "Remove feature branch folder"
          git push

      - name: Deactivate deployment
        uses: bobheadxi/deployments@648679e8e4915b27893bd7dbc35cb504dc915bc8 # v1.5.0
        if: always()
        with:
          step: deactivate-env
          token: ${{ secrets.GITHUB_TOKEN }}
          env: demo-${{ env.BRANCH_NAME }}
