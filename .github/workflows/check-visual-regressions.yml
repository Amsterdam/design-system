name: Check visual regressions

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, ready_for_review]
permissions:
  contents: read
  pull-requests: write

# A newer Chromatic run for the same PR makes the one in flight obsolete – cancel it to save snapshots.
# Only qualifying events may cancel: this workflow triggers on every PR comment, and the job’s `if`
# only filters after the concurrency group has been entered.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || (startsWith(github.event.comment.body, '/chromatic test') && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) }}

jobs:
  run-chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && 
       (github.event.action == 'ready_for_review' || 
        (github.event.action == 'opened' && github.event.pull_request.draft == false))) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/chromatic test') &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'))
    steps:
      - name: React to comment
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=eyes

      - name: Get PR info
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
            echo "branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            PR_DATA=$(gh pr view ${{ github.event.issue.number }} --json headRefOid,headRefName --repo ${{ github.repository }})
            echo "sha=$(echo "$PR_DATA" | jq -r '.headRefOid')" >> $GITHUB_OUTPUT
            echo "branch=$(echo "$PR_DATA" | jq -r '.headRefName')" >> $GITHUB_OUTPUT
          fi

      - name: Check out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-info.outputs.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js version
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter=!storybook -r run build

      - name: Run Chromatic
        uses: chromaui/action@c8eb1dde813a34d0e86b136d8c4faedd0a7351ab # v17.7.1
        with:
          branchName: ${{ steps.pr-info.outputs.branch }}
          chromaticSha: ${{ steps.pr-info.outputs.sha }}
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: storybook
